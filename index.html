<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Fun Facts</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #8bc6ec, #9599e2);
      font-family: Arial, sans-serif;
      color: #1d1f3a;
    }

    .container {
      max-width: 700px;
      width: 90%;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.14);
      padding: 36px;
      text-align: center;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(2rem, 3vw, 3rem);
    }

    p {
      margin: 0 0 28px;
      line-height: 1.75;
      font-size: 1.05rem;
    }

    .fact-card {
      margin: 24px 0;
      padding: 24px;
      border-radius: 18px;
      background: linear-gradient(135deg, #f6f3ff, #e4f3ff);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.06);
      font-size: 1.15rem;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 14px 26px;
      font-size: 1rem;
      cursor: pointer;
      background: #5d7cff;
      color: #fff;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      background: #4862d8;
    }

    footer {
      margin-top: 18px;
      color: #5d5d7d;
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Random Fun Facts</h1>
    <p>Click the button to reveal a new fun fact and learn something surprising.</p>

    <div class="fact-card" id="factCard">Press the button to get your first fact.</div>
    <button id="newFactButton">Show a random fun fact</button>

    <footer>Powered by simple JavaScript and a sprinkle of curiosity.</footer>
  </div>

  <script>
    const facts = [
      "Honey never spoils. Archaeologists have found edible honey in ancient Egyptian tombs.",
      "Octopuses have three hearts and blue blood.",
      "Bananas are berries, but strawberries are not.",
      "A day on Venus is longer than a year on Venus.",
      "You can hear a blue whale's heartbeat from more than 2 miles away.",
      "There are more trees on Earth than stars in the Milky Way.",
      "A single strand of spaghetti is called a 'spaghetto'.",
      "Wombat poop is cube-shaped.",
      "A bolt of lightning is five times hotter than the surface of the sun.",
      "Some turtles can breathe through their butts.",
      "The shortest war in history lasted just 38 minutes.",
      "The Eiffel Tower can be 15 cm taller during the summer.",
      "A group of flamingos is called a flamboyance.",
      "Your stomach gets a new lining every few days to protect itself from acid.",
      "Penguins propose to mates with a pebble.",
    ];

    const factCard = document.getElementById('factCard');
    const button = document.getElementById('newFactButton');

    function getRandomFact() {
      const index = Math.floor(Math.random() * facts.length);
      return facts[index];
    }

    button.addEventListener('click', () => {
      factCard.textContent = getRandomFact();
    });
  </script>
</body>
</html>
